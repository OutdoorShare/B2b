openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Rental Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: business
    description: Business profile management
  - name: listings
    description: Equipment listings management
  - name: bookings
    description: Booking management
  - name: quotes
    description: Custom quotes
  - name: analytics
    description: Analytics and reporting
  - name: categories
    description: Equipment categories
  - name: docs
    description: Documentation portal
  - name: openai
    description: OpenAI AI chat, image, and audio operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /business:
    get:
      operationId: getBusinessProfile
      tags: [business]
      summary: Get business profile
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"
    put:
      operationId: updateBusinessProfile
      tags: [business]
      summary: Update business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessProfile"
      responses:
        "200":
          description: Updated business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategory"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get all listings
      parameters:
        - name: categoryId
          in: query
          schema:
            type: number
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, draft]
        - name: search
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListing"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    put:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListing"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Delete a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "204":
          description: Deleted

  /bookings:
    get:
      operationId: getBookings
      tags: [bookings]
      summary: Get all bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, active, completed, cancelled]
        - name: listingId
          in: query
          schema:
            type: number
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBooking"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    put:
      operationId: updateBooking
      tags: [bookings]
      summary: Update a booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBooking"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /quotes:
    get:
      operationId: getQuotes
      tags: [quotes]
      summary: Get all custom quotes
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a custom quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuote"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    put:
      operationId: updateQuote
      tags: [quotes]
      summary: Update a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuote"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get dashboard analytics summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Get revenue analytics by period
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 12m]
      responses:
        "200":
          description: Revenue analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

  /analytics/top-listings:
    get:
      operationId: getTopListings
      tags: [analytics]
      summary: Get top performing listings
      responses:
        "200":
          description: Top listings by revenue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopListing"

  /analytics/booking-status:
    get:
      operationId: getBookingStatusBreakdown
      tags: [analytics]
      summary: Get booking status breakdown
      responses:
        "200":
          description: Booking status counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  # ── Documentation Portal ─────────────────────────────────────────────────

  /docs/stats:
    get:
      operationId: getDocsStats
      tags: [docs]
      summary: Portal statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocStats"

  /docs/search:
    get:
      operationId: searchDocs
      tags: [docs]
      summary: Full-text search across all docs
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [guide, faq, troubleshooting, release-notes, reference]
        - name: categoryId
          in: query
          schema:
            type: number
        - name: projectId
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocSearchResult"

  /docs/trending:
    get:
      operationId: getTrendingDocs
      tags: [docs]
      summary: Trending / most-viewed articles
      responses:
        "200":
          description: Trending articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocArticle"

  /docs/categories:
    get:
      operationId: getDocCategories
      tags: [docs]
      summary: List all documentation categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocCategory"
    post:
      operationId: createDocCategory
      tags: [docs]
      summary: Create a documentation category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocCategory"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocCategory"

  /docs/categories/{slug}:
    get:
      operationId: getDocCategory
      tags: [docs]
      summary: Get a category with its articles
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocCategoryDetail"

  /docs/categories/{id}:
    put:
      operationId: updateDocCategory
      tags: [docs]
      summary: Update a documentation category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocCategory"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocCategory"
    delete:
      operationId: deleteDocCategory
      tags: [docs]
      summary: Delete a documentation category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "204":
          description: Deleted

  /docs/articles:
    get:
      operationId: getDocArticles
      tags: [docs]
      summary: List documentation articles
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: number
        - name: type
          in: query
          schema:
            type: string
            enum: [guide, faq, troubleshooting, release-notes, reference]
        - name: projectId
          in: query
          schema:
            type: number
        - name: featureId
          in: query
          schema:
            type: number
        - name: published
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: number
        - name: offset
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocArticle"
    post:
      operationId: createDocArticle
      tags: [docs]
      summary: Create a documentation article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocArticle"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocArticle"

  /docs/articles/{slug}:
    get:
      operationId: getDocArticle
      tags: [docs]
      summary: Get an article by slug with related articles
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocArticleDetail"

  /docs/articles/{id}:
    put:
      operationId: updateDocArticle
      tags: [docs]
      summary: Update a documentation article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocArticle"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocArticle"
    delete:
      operationId: deleteDocArticle
      tags: [docs]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "204":
          description: Deleted

  /docs/projects:
    get:
      operationId: getDocProjects
      tags: [docs]
      summary: List all projects
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocProject"
    post:
      operationId: createDocProject
      tags: [docs]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocProject"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocProject"

  /docs/projects/{slug}:
    get:
      operationId: getDocProject
      tags: [docs]
      summary: Get a project with its articles
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocProjectDetail"

  /docs/projects/{id}:
    put:
      operationId: updateDocProject
      tags: [docs]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocProject"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocProject"
    delete:
      operationId: deleteDocProject
      tags: [docs]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "204":
          description: Deleted

  /docs/features:
    get:
      operationId: getDocFeatures
      tags: [docs]
      summary: List all features
      parameters:
        - name: projectId
          in: query
          schema:
            type: number
        - name: status
          in: query
          schema:
            type: string
            enum: [stable, beta, deprecated]
      responses:
        "200":
          description: Features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocFeature"
    post:
      operationId: createDocFeature
      tags: [docs]
      summary: Create a feature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocFeature"
      responses:
        "201":
          description: Created feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocFeature"

  /docs/features/{slug}:
    get:
      operationId: getDocFeature
      tags: [docs]
      summary: Get a feature with its articles
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Feature detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocFeatureDetail"

  /docs/features/{id}:
    put:
      operationId: updateDocFeature
      tags: [docs]
      summary: Update a feature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocFeature"
      responses:
        "200":
          description: Updated feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocFeature"
    delete:
      operationId: deleteDocFeature
      tags: [docs]
      summary: Delete a feature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "204":
          description: Deleted

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BusinessProfile:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        logoUrl:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        accentColor:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string
          nullable: true
        location:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        zipCode:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        socialInstagram:
          type: string
          nullable: true
        socialFacebook:
          type: string
          nullable: true
        socialTwitter:
          type: string
          nullable: true
        depositRequired:
          type: boolean
        depositPercent:
          type: number
        cancellationPolicy:
          type: string
        rentalTerms:
          type: string
          nullable: true
        kioskModeEnabled:
          type: boolean
        embedCode:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - tagline
        - description
        - primaryColor
        - accentColor
        - email
        - phone
        - location
        - depositRequired
        - depositPercent
        - cancellationPolicy
        - kioskModeEnabled
        - createdAt
        - updatedAt

    UpdateBusinessProfile:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        logoUrl:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        accentColor:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string
          nullable: true
        location:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        zipCode:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        socialInstagram:
          type: string
          nullable: true
        socialFacebook:
          type: string
          nullable: true
        socialTwitter:
          type: string
          nullable: true
        depositRequired:
          type: boolean
        depositPercent:
          type: number
        cancellationPolicy:
          type: string
        rentalTerms:
          type: string
          nullable: true
        kioskModeEnabled:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        listingCount:
          type: number
        createdAt:
          type: string
      required: [id, name, slug, listingCount, createdAt]

    CreateCategory:
      type: object
      properties:
