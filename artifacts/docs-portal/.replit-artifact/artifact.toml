kind = "web"
previewPath = "/docs/"
title = "Documentation Portal"
version = "1.0.0"
id = "artifacts/docs-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/docs/" ]
localPort = 19932

[services.development]
run = "pnpm --filter @workspace/docs-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docs-portal", "run", "build" ]
publicDir = "artifacts/docs-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19932"
BASE_PATH = "/docs/"
