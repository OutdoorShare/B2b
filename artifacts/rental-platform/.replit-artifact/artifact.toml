kind = "web"
previewPath = "/"
title = "Rental Platform"
version = "1.0.0"
id = "artifacts/rental-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25355

[services.development]
run = "pnpm --filter @workspace/rental-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rental-platform", "run", "build" ]
publicDir = "artifacts/rental-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25355"
BASE_PATH = "/"
